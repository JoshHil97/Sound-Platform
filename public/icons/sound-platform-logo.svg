<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sound Platform logo icon</title>
  <desc id="desc">A bright church cross integrated into a purple, blue, and teal audio waveform.</desc>
  <defs>
    <linearGradient id="barGradient" x1="8" y1="32" x2="56" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="0.48" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="crossGradient" x1="32" y1="9" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.48" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="brandGlow" x="-18" y="-18" width="100" height="100" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.545 0 0 0 0 0.361 0 0 0 0 0.965 0 0 0 0.54 0" result="violet"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.28" result="sourceSoft"/>
      <feMerge>
        <feMergeNode in="violet"/>
        <feMergeNode in="sourceSoft"/>
      </feMerge>
    </filter>
    <filter id="whiteGlow" x="17" y="6" width="30" height="52" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.92 0 0 0 0 0.98 0 0 0 0 1 0 0 0 0.85 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#brandGlow)" stroke="url(#barGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 32H10.5"/>
    <path d="M14.5 29V35"/>
    <path d="M19.5 25.5V38.5"/>
    <path d="M24.5 19.5V44.5"/>
    <path d="M28.6 15.5V48.5"/>
    <path d="M35.4 15.5V48.5"/>
    <path d="M39.5 19.5V44.5"/>
    <path d="M44.5 25.5V38.5"/>
    <path d="M49.5 29V35"/>
    <path d="M53.5 32H56"/>
  </g>

  <g filter="url(#whiteGlow)" stroke="url(#crossGradient)" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 10.5V54"/>
    <path d="M22.8 29.5H41.2"/>
  </g>

  <g stroke="#FFFFFF" stroke-opacity="0.82" stroke-width="1.15" stroke-linecap="round">
    <path d="M32 12.8V51.2"/>
    <path d="M24.9 29.5H39.1"/>
  </g>
</svg>
